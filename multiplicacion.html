<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VerbiFox · Multiplicar jugando</title>
<style>
  :root{ --azul:#3b82f6; --naranja:#f97316; --rojo:#e11d48; --verde:#2bb673; --choco:#8b5a2b; --fondo:#0f1b34; }
  *{ box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; background:radial-gradient(circle at 30% 20%, #16244a, var(--fondo)); min-height:100vh; overflow:hidden; touch-action:none; }

  .top{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 92px 12px 14px; flex-wrap:wrap; position:relative; z-index:8; }
  .tabs{ display:flex; gap:6px; background:rgba(255,255,255,.12); border-radius:12px; padding:4px; }
  .tab{ border:0; background:transparent; color:#cdd7e4; font-weight:800; padding:8px 14px; border-radius:9px; cursor:pointer; font-size:.95rem; }
  .tab.on{ background:#fff; color:#26303b; }
  .ecuacion{ background:#fff; border-radius:14px; padding:8px 12px; display:flex; align-items:center; gap:8px; font-weight:800; font-size:1.25rem; color:#26303b; box-shadow:0 4px 12px rgba(0,0,0,.3); }
  .ecuacion input{ width:60px; height:44px; text-align:center; font-size:1.25rem; font-weight:800; border:2px solid #cbd5e1; border-radius:10px; background:#eef2f7; color:#26303b; }
  .ecuacion input:focus{ outline:none; border-color:var(--naranja); background:#fff; }

  .leyenda{ position:relative; z-index:5; display:flex; gap:14px; width:max-content; margin:6px auto 0; background:#fff; border-radius:14px; padding:6px 14px; box-shadow:0 4px 14px rgba(0,0,0,.3); }
  .leyenda div{ display:flex; align-items:center; gap:6px; margin:0; font-weight:800; color:#26303b; }
  .leyenda .b{ width:26px; height:26px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:#fff; font-size:.85rem; flex-shrink:0; }

  .consigna{ position:relative; z-index:5; width:max-content; margin:0 auto; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.35); color:#fff; border-radius:12px; padding:8px 16px; font-weight:800; text-align:center; max-width:92vw; }

  #tablero{ position:fixed; inset:0; pointer-events:none; }
  #tablero .bola{ pointer-events:auto; }
  .bola{ position:absolute; width:42px; height:42px; border-radius:50%; background:radial-gradient(circle at 32% 30%, #6ba3ff, var(--azul) 65%); box-shadow:0 4px 10px rgba(0,0,0,.4); cursor:grab; transition:left .28s cubic-bezier(.2,.9,.3,1.2), top .28s cubic-bezier(.2,.9,.3,1.2), background .2s; z-index:2; will-change:transform; }
  .bola.arrastrando{ transition:none; z-index:10; cursor:grabbing; box-shadow:0 10px 22px rgba(0,0,0,.55); }
  .bola.parcial{ background:radial-gradient(circle at 32% 30%, #ff6d94, var(--rojo) 65%); }
  .bola.completa{ background:radial-gradient(circle at 32% 30%, #ffab6b, var(--naranja) 65%); cursor:pointer; }
  .bola.pop{ animation:pop .4s cubic-bezier(.2,1.6,.4,1); }
  @keyframes pop{ 0%{transform:scale(.6)} 60%{transform:scale(1.25)} 100%{transform:scale(1)} }

  /* MATRIZ */
  #matriz{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:130px 14px 96px; }
  .grid{ display:grid; gap:6px; touch-action:none; }
  .celda{ width:100%; height:100%; border-radius:8px; background:rgba(255,255,255,.10); border:1px dashed rgba(255,255,255,.22); transition:background .15s, transform .15s; }
  .celda.pintada{ background:linear-gradient(145deg,#a86b34,var(--choco)); border:1px solid #5c3a1a; box-shadow:inset 0 -3px 0 rgba(0,0,0,.3); transform:scale(1.02); }
  .dims{ position:fixed; left:50%; bottom:96px; transform:translateX(-50%); color:#fff; font-weight:800; font-size:1.3rem; z-index:5; background:rgba(255,255,255,.14); padding:6px 18px; border-radius:12px; }

  .abajo{ position:fixed; left:0; right:0; bottom:0; display:flex; gap:10px; justify-content:center; padding:12px; z-index:6; flex-wrap:wrap; }
  .btn{ border:0; border-radius:14px; padding:13px 20px; font-weight:800; font-size:1rem; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.25); }
  .btn:active{ transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.25); }
  .b-verde{ background:var(--verde); color:#fff; } .b-gris{ background:#dbe3ec; color:#26303b; } .b-azulb{ background:#3a7bd5; color:#fff; }

  #msj{ position:fixed; left:50%; top:120px; transform:translateX(-50%); background:#fff; color:#26303b; border-radius:14px; padding:12px 18px; font-weight:800; box-shadow:0 8px 24px rgba(0,0,0,.4); z-index:20; display:none; text-align:center; max-width:88vw; }
  .volver{ position:fixed; right:10px; top:12px; z-index:9; background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.4); border-radius:10px; padding:7px 12px; font-weight:700; text-decoration:none; font-size:.85rem; }
</style>
</head>
<body>
  <div class="top">
    <div class="tabs">
      <button class="tab on" id="tabG" onclick="setModo('grupos')">🌸 Grupos</button>
      <button class="tab" id="tabM" onclick="setModo('matriz')">🍫 Matriz</button>
    </div>
    <div class="ecuacion">
      <span id="eA">4</span> × <span id="eB">5</span> =
      <input id="inT" inputmode="numeric" maxlength="3" placeholder="">
    </div>
  </div>
  <a class="volver" href="mate.html">✕ Salir</a>
  <div class="consigna" id="consigna"></div>
  <div class="leyenda" id="leyenda"></div>
  <div id="tablero"></div>

  <div id="matriz"><div class="grid" id="grid"></div></div>
  <div class="dims" id="dims" style="display:none">0 × 0</div>

  <div id="msj"></div>
  <div class="abajo">
    <button class="btn b-azulb" id="btnExtra" onclick="accionExtra()">↩️ Deshacer grupo</button>
    <button class="btn b-verde" onclick="comprobar()">✔ Comprobar</button>
    <button class="btn b-gris" onclick="nuevo()">🎲 Nuevo</button>
  </div>

<script>
const $=id=>document.getElementById(id);
let modo='grupos';
let G=4, M=5;               // G grupos de M
let bolas=[], grupos=[], gid=1;
const tablero=$('tablero');

function beep(f,d){ try{ const c=beep.ctx=beep.ctx||new (window.AudioContext||window.webkitAudioContext)(); const o=c.createOscillator(), g=c.createGain(); o.frequency.value=f; o.type='sine'; g.gain.setValueAtTime(.18,c.currentTime); g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+d); }catch(e){} }
function msj(t,largo){ const m=$('msj'); m.innerHTML=t; m.style.display='block'; clearTimeout(m._t); m._t=setTimeout(()=>m.style.display='none', largo?3800:2600); }

function setModo(m){
  modo=m;
  $('tabG').classList.toggle('on', m==='grupos');
  $('tabM').classList.toggle('on', m==='matriz');
  tablero.style.display = m==='grupos'?'block':'none';
  $('leyenda').style.display = m==='grupos'?'block':'none';
  $('matriz').style.display = m==='matriz'?'flex':'none';
  $('dims').style.display = m==='matriz'?'block':'none';
  $('btnExtra').textContent = m==='grupos'?'↩️ Deshacer grupo':'🔄 Girar';
  nuevo();
}
function accionExtra(){ modo==='grupos' ? deshacer() : girar(); }

function nuevo(){ $('inT').value=''; modo==='grupos' ? nuevoGrupos() : nuevoMatriz(); }

/* ============ MODO 1: FÁBRICA DE GRUPOS (peloticas) ============ */
function nuevoGrupos(){
  G=2+Math.floor(Math.random()*4);           // 2..5 grupos
  M=2+Math.floor(Math.random()*5);           // de 2..6
  while(G*M>30){ M--; }
  $('eA').textContent=G; $('eB').textContent=M;
  $('consigna').innerHTML=`Forma <b>${G} grupos</b> de <b>${M}</b> 🌸 y descubre el total`;
  tablero.innerHTML=''; bolas=[]; grupos=[]; gid=1;
  leyenda();
  const W=innerWidth, H=innerHeight;
  const yTop=$('leyenda').getBoundingClientRect().bottom+14;
  const yAlto=Math.max(120, H-yTop-190);
  for(let i=0;i<G*M;i++){
    const b=document.createElement('div'); b.className='bola';
    const x=40+Math.random()*(W-120), y=yTop+Math.random()*yAlto;
    b.style.left=x+'px'; b.style.top=y+'px';
    b._x=x; b._y=y; b._grupo=null;
    b._wx=0; b._wy=0;
    b._amp=3+Math.random()*3; b._sp=0.5+Math.random()*0.6;
    b._ph=Math.random()*Math.PI*2; b._ph2=Math.random()*Math.PI*2;
    b._drag=false;
    tablero.appendChild(b); activarArrastre(b); bolas.push(b);
  }
  leyenda();
}
function centro(b){ return { x:b._x+21, y:b._y+21 }; }
function centroGrupo(g){ let x=0,y=0; for(const m of g.miembros){ const c=centro(m); x+=c.x; y+=c.y; } return { x:x/g.miembros.length, y:y/g.miembros.length }; }

function activarArrastre(b){
  b.addEventListener('pointerdown', ev=>{
    const g=b._grupo;
    if(g && g.completo){ romper(g); return; }
    if(g) salirDeGrupo(b);
    b._x+=b._wx; b._y+=b._wy; b._wx=0; b._wy=0; b._drag=true;
    b.style.left=b._x+'px'; b.style.top=b._y+'px';
    b.style.transform='scale(1.15)';
    b.setPointerCapture(ev.pointerId);
    b.classList.add('arrastrando');
    const dx=ev.clientX-b._x, dy=ev.clientY-b._y;
    const move=e=>{ b._x=e.clientX-dx; b._y=e.clientY-dy; b.style.left=b._x+'px'; b.style.top=b._y+'px'; };
    const up=()=>{ b.classList.remove('arrastrando'); b.style.transform=''; b._drag=false;
      b._ph=Math.random()*Math.PI*2; b._ph2=Math.random()*Math.PI*2;
      b.removeEventListener('pointermove',move); b.removeEventListener('pointerup',up); soltar(b); };
    b.addEventListener('pointermove',move); b.addEventListener('pointerup',up);
  });
}
function soltar(b){
  const c=centro(b);
  let mejor=null, dist=74;
  for(const g of grupos){
    if(g.completo || g.miembros.length>=M) continue;
    const gc=centroGrupo(g);
    const d=Math.hypot(gc.x+g._wx-c.x, gc.y+g._wy-c.y);
    if(d<dist){ dist=d; mejor={tipo:'grupo', g}; }
  }
  for(const o of bolas){
    if(o===b || o._grupo) continue;
    const oc=centro(o);
    const d=Math.hypot(oc.x+o._wx-c.x, oc.y+o._wy-c.y);
    if(d<dist){ dist=d; mejor={tipo:'bola', o}; }
  }
  if(!mejor){ leyenda(); return; }
  let g;
  if(mejor.tipo==='grupo'){ g=mejor.g; }
  else {
    const o=mejor.o;
    o._x+=o._wx; o._y+=o._wy; o._wx=0; o._wy=0;
    o.style.left=o._x+'px'; o.style.top=o._y+'px';
    g={id:gid++, miembros:[o], completo:false, _wx:0,_wy:0, _sp:0.4+Math.random()*0.4, _ph:Math.random()*Math.PI*2, _ph2:Math.random()*Math.PI*2};
    o._grupo=g; grupos.push(g);
  }
  g.miembros.push(b); b._grupo=g; b._wx=0; b._wy=0; b.style.transform='';
  if(g.miembros.length>=M){ g.completo=true; beep(660,.12); setTimeout(()=>beep(880,.18),110);
    if(grupos.filter(x=>x.completo).length===G){ setTimeout(()=>beep(1100,.2),240); msj(`🌸 ¡${G} grupos de ${M} listos! ¿Cuánto es el total?`); $('inT').focus(); }
  } else beep(440,.08);
  acomodar(g); leyenda();
}
function acomodar(g){
  const c=centroGrupo(g); const n=g.miembros.length;
  const R = n===1?0 : (n<=3? 20 : 24);
  g.miembros.forEach((m,i)=>{
    const ang=-Math.PI/2 + i*(2*Math.PI/Math.max(n,1));
    m._x=c.x+(n>1?R*Math.cos(ang):0)-21; m._y=c.y+(n>1?R*Math.sin(ang):0)-21;
    m.style.left=m._x+'px'; m.style.top=m._y+'px';
    m.classList.remove('parcial','completa');
    m.classList.add(g.completo?'completa':'parcial','pop');
    setTimeout(()=>m.classList.remove('pop'),450);
  });
}
function salirDeGrupo(b){
  const g=b._grupo; if(!g) return;
  g.miembros=g.miembros.filter(m=>m!==b);
  b._grupo=null; b.classList.remove('parcial','completa');
  b._x+=g._wx; b._y+=g._wy; b._wx=0; b._wy=0;
  b.style.left=b._x+'px'; b.style.top=b._y+'px'; b.style.transform='';
  if(!g.miembros.length) grupos=grupos.filter(x=>x!==g);
  else acomodar(g);
  leyenda();
}
function romper(g){
  beep(300,.12);
  const c=centroGrupo(g);
  for(const m of g.miembros){
    m._grupo=null; m.classList.remove('parcial','completa');
    const ang=Math.random()*2*Math.PI, d=60+Math.random()*50;
    m._x=Math.max(20,Math.min(innerWidth-62, c.x+g._wx+d*Math.cos(ang)-21));
    m._y=Math.max(140,Math.min(innerHeight-160, c.y+g._wy+d*Math.sin(ang)-21));
    m._wx=0; m._wy=0; m._ph=Math.random()*Math.PI*2; m._ph2=Math.random()*Math.PI*2;
    m.style.left=m._x+'px'; m.style.top=m._y+'px'; m.style.transform='';
  }
  grupos=grupos.filter(x=>x!==g);
  leyenda();
}
function deshacer(){ const g=[...grupos].reverse().find(x=>x.completo)||grupos[grupos.length-1]; if(g) romper(g); }
function leyenda(){
  const comp=grupos.filter(g=>g.completo).length;
  const parc=grupos.filter(g=>!g.completo);
  const sueltas=bolas.filter(b=>!b._grupo).length;
  let h=`<div><span class="b" style="background:var(--naranja)">${M}</span>× ${comp}</div>`;
  for(const p of parc) h+=`<div><span class="b" style="background:var(--rojo)">${p.miembros.length}</span>× 1</div>`;
  h+=`<div><span class="b" style="background:var(--azul)">1</span>× ${sueltas}</div>`;
  $('leyenda').innerHTML=h;
}

/* ============ MODO 2: MATRIZ DE CHOCOLATES (área) ============ */
let MF=3, MC=6, selF=0, selC=0, GF=6, GC=8; // problema y selección
function nuevoMatriz(){
  MF=2+Math.floor(Math.random()*4);       // filas 2..5
  MC=3+Math.floor(Math.random()*6);       // columnas 3..8
  GF=Math.max(MF+1,5); GC=Math.max(MC+1,8);
  selF=0; selC=0;
  $('eA').textContent=MF; $('eB').textContent=MC;
  $('consigna').innerHTML=`Pinta una tableta de <b>${MF} filas × ${MC} columnas</b> 🍫`;
  $('matriz').style.paddingTop=($('consigna').getBoundingClientRect().bottom+10)+'px';
  $('dims').style.bottom=(document.querySelector('.abajo').offsetHeight+10)+'px';
  const grid=$('grid');
  const cw=Math.min(52, Math.floor((innerWidth-40)/GC)-6,
      Math.floor((innerHeight-$('consigna').getBoundingClientRect().bottom-190)/GF)-6);
  grid.style.gridTemplateColumns=`repeat(${GC}, ${cw}px)`;
  grid.style.gridAutoRows=cw+'px';
  grid.innerHTML='';
  for(let f=0; f<GF; f++) for(let c=0; c<GC; c++){
    const d=document.createElement('div'); d.className='celda'; d.dataset.f=f; d.dataset.c=c;
    grid.appendChild(d);
  }
  pintarSel();
  // arrastrar para pintar desde la esquina
  grid.onpointerdown=ev=>{ grid.setPointerCapture(ev.pointerId); pintaDesde(ev); grid.onpointermove=pintaDesde; };
  grid.onpointerup=()=>{ grid.onpointermove=null; if(selF===MF&&selC===MC||selF===MC&&selC===MF){ beep(660,.12); setTimeout(()=>beep(880,.15),110); msj('🍫 ¡Tableta lista! ¿Cuántos chocolates son?'); $('inT').focus(); } };
}
function pintaDesde(ev){
  const el=document.elementFromPoint(ev.clientX, ev.clientY);
  if(!el || !el.classList.contains('celda')) return;
  selF=parseInt(el.dataset.f,10)+1; selC=parseInt(el.dataset.c,10)+1;
  pintarSel(); beep(320+selF*40+selC*10,.03);
}
function pintarSel(){
  document.querySelectorAll('.celda').forEach(d=>{
    const f=+d.dataset.f, c=+d.dataset.c;
    d.classList.toggle('pintada', f<selF && c<selC);
  });
  $('dims').textContent=`${selF} × ${selC}${selF&&selC?(' = ¿?'):''}`;
}
function girar(){
  [selF,selC]=[selC,selF];
  if(selF>GF||selC>GC){ [selF,selC]=[selC,selF]; msj('No cabe girada en esta tableta 😅'); return; }
  pintarSel(); beep(500,.1);
  msj(`🔄 ¡Mira! ${selC} × ${selF} y ${selF} × ${selC} tienen los MISMOS chocolates.`);
}

/* ============ Comprobación ============ */
function comprobar(){
  const t=parseInt($('inT').value,10);
  const R=modo==='grupos'? G*M : MF*MC;
  if(isNaN(t)){ msj('✏️ Escribe el total.'); return; }
  if(modo==='grupos'){
    const comp=grupos.filter(g=>g.completo).length;
    if(t===R && comp===G){
      beep(660,.12); setTimeout(()=>beep(880,.12),120); setTimeout(()=>beep(1100,.2),240);
      premioMate();
      msj(`🎉 ¡PERFECTO! ${G} grupos de ${M} = <b>${R}</b>. ¡Multiplicar es sumar grupos iguales! 🏆`, true);
      setTimeout(nuevo, 3400);
    } else if(t===R){ msj(`🔢 ¡El número está bien! Ahora demuéstralo: forma <b>${G} flores</b> de ${M} 🌸 (llevas ${comp}).`); }
    else if(comp===G){ msj(`🌸 ¡Los grupos están perfectos! Cuenta todas las peloticas de las flores: ${G} veces ${M}…`); }
    else msj(`💪 Forma ${G} grupos de ${M} arrastrando las peloticas, y cuenta el total.`);
  } else {
    const bien=(selF===MF&&selC===MC)||(selF===MC&&selC===MF);
    if(t===R && bien){
      beep(660,.12); setTimeout(()=>beep(880,.12),120); setTimeout(()=>beep(1100,.2),240);
      premioMate();
      msj(`🎉 ¡GENIAL! ${MF} × ${MC} = <b>${R}</b>. Y girada es lo mismo: ¡el orden no cambia el total! 🏆`, true);
      setTimeout(nuevo, 3400);
    } else if(t===R){ msj(`🔢 ¡El número está bien! Ahora pinta la tableta de <b>${MF} × ${MC}</b> arrastrando el dedo.`); }
    else if(bien){ msj(`🍫 ¡La tableta está perfecta! Cuenta los chocolates: ${MF} filas de ${MC}…`); }
    else msj(`💪 Arrastra el dedo por la tableta hasta pintar ${MF} × ${MC}.`);
  }
}

/* ===== vibración molecular (solo modo grupos) ===== */
function animar(ts){
  const t=(ts||0)/1000;
  if(modo==='grupos'){
    for(const b of bolas){
      if(b._grupo || b._drag) continue;
      b._wx=b._amp*Math.sin(t*b._sp+b._ph);
      b._wy=b._amp*Math.cos(t*b._sp*0.9+b._ph2);
      b.style.transform=`translate(${b._wx.toFixed(1)}px,${b._wy.toFixed(1)}px)`;
    }
    for(const g of grupos){
      const amp=g.completo?2:3;
      g._wx=amp*Math.sin(t*g._sp+g._ph);
      g._wy=amp*Math.cos(t*g._sp*0.85+g._ph2);
      const tr=`translate(${g._wx.toFixed(1)}px,${g._wy.toFixed(1)}px)`;
      for(const m of g.miembros){ if(!m._drag) m.style.transform=tr; }
    }
  }
  requestAnimationFrame(animar);
}

nuevo();
requestAnimationFrame(animar);
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="cloud.js"></script>
<script src="caballero.js"></script>
<script>
const JUEGO='multiplicacion';
function premioMate(){
  try{
    const k='mate_juego_'+JUEGO; const n=(parseInt(localStorage.getItem(k)||'0',10)||0)+1; localStorage.setItem(k,String(n));
    if(window.Caballero && Caballero.premiar){ Caballero.premiar(1); gemToast(); }
  }catch(e){}
}
function gemToast(){
  let t=document.getElementById('gemtoast');
  if(!t){ t=document.createElement('div'); t.id='gemtoast'; t.style.cssText='position:fixed;left:50%;top:70px;transform:translateX(-50%);background:#fff7e6;color:#7c4a03;font-weight:800;padding:8px 16px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.3);z-index:50;transition:opacity .3s;pointer-events:none'; document.body.appendChild(t); }
  t.textContent='💎 +1 gema para tu Caballero'; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>{t.style.opacity='0';},1500);
}
</script>
</body>
</html>
