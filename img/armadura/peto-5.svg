<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="steel5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#cfd8e2"/>
    </linearGradient>
    <linearGradient id="gold5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe89a"/><stop offset="1" stop-color="#e6ab26"/>
    </linearGradient>
    <linearGradient id="cape5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f6bc0"/><stop offset="1" stop-color="#274a95"/>
    </linearGradient>
    <radialGradient id="gem5" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#d8f6ff"/><stop offset="0.5" stop-color="#5ad0ff"/><stop offset="1" stop-color="#2a8fd8"/>
    </radialGradient>
  </defs>
  <!-- capa épica -->
  <path d="M30,38 C15,60 17,94 24,107 L42,97 C36,76 37,54 44,42 Z" fill="url(#cape5)" stroke="#1d356b" stroke-width="2"/>
  <path d="M90,38 C105,60 103,94 96,107 L78,97 C84,76 83,54 76,42 Z" fill="url(#cape5)" stroke="#1d356b" stroke-width="2"/>
  <!-- alas doradas en los hombros -->
  <path d="M30,46 C14,40 10,30 12,24 C22,26 30,32 36,40 Z" fill="url(#gold5)" stroke="#a9760f" stroke-width="2.4"/>
  <path d="M90,46 C106,40 110,30 108,24 C98,26 90,32 84,40 Z" fill="url(#gold5)" stroke="#a9760f" stroke-width="2.4"/>
  <!-- hombreras -->
  <path d="M27,50 C16,33 34,22 48,30 C43,40 42,46 42,51 Z" fill="url(#gold5)" stroke="#a9760f" stroke-width="2.8"/>
  <path d="M93,50 C104,33 86,22 72,30 C77,40 78,46 78,51 Z" fill="url(#gold5)" stroke="#a9760f" stroke-width="2.8"/>
  <!-- cuerpo blanco-plata -->
  <path d="M34,42 C34,28 46,24 60,24 C74,24 86,28 86,42 L88,74 C88,98 74,107 60,107 C46,107 32,98 32,74 Z"
        fill="url(#steel5)" stroke="#39454f" stroke-width="3.4"/>
  <!-- borde dorado grueso -->
  <path d="M34,42 C34,28 46,24 60,24 C74,24 86,28 86,42 L88,74 C88,98 74,107 60,107 C46,107 32,98 32,74 Z"
        fill="none" stroke="url(#gold5)" stroke-width="3.6"/>
  <ellipse cx="60" cy="33" rx="11" ry="6" fill="#e9edf2" stroke="#a9760f" stroke-width="2.6"/>
  <!-- montura dorada de la gema -->
  <path d="M60,50 l10,12 -10,12 -10,-12 Z" fill="url(#gold5)" stroke="#a9760f" stroke-width="2.4"/>
  <!-- gema brillante -->
  <path d="M60,54 l6.5,8 -6.5,8 -6.5,-8 Z" fill="url(#gem5)" stroke="#2a8fd8" stroke-width="1.4"/>
  <path d="M60,56 l3,3.5 -3,3.5 -3,-3.5 Z" fill="#ffffff" opacity=".85"/>
  <!-- abdomen dorado -->
  <path d="M44,84 h32 M47,92 h26 M50,100 h20" stroke="url(#gold5)" stroke-width="3.2" stroke-linecap="round"/>
  <!-- destellos -->
  <path d="M40,60 l1.4,3 3,1.4 -3,1.4 -1.4,3 -1.4,-3 -3,-1.4 3,-1.4 Z" fill="#fff6c8"/>
  <path d="M82,68 l1,2.2 2.2,1 -2.2,1 -1,2.2 -1,-2.2 -2.2,-1 2.2,-1 Z" fill="#fff6c8"/>
</svg>
