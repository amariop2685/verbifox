<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <style>.t{font:700 13px -apple-system,sans-serif;fill:#26303b}</style>
  <!-- cielo y sol -->
  <circle cx="44" cy="40" r="22" fill="#ffd23f"/>
  <g stroke="#ffd23f" stroke-width="3" stroke-linecap="round"><line x1="44" y1="6" x2="44" y2="0"/><line x1="16" y1="20" x2="10" y2="15"/><line x1="72" y1="20" x2="78" y2="15"/></g>
  <!-- nube -->
  <g fill="#e6edf3" stroke="#9fb3c4" stroke-width="2">
    <ellipse cx="235" cy="46" rx="34" ry="20"/><ellipse cx="270" cy="50" rx="26" ry="16"/><ellipse cx="205" cy="52" rx="22" ry="14"/>
  </g>
  <text x="238" y="50" text-anchor="middle" class="t">Condensación</text>
  <!-- mar -->
  <path d="M0,150 Q90,138 180,150 T360,150 L360,200 L0,200 Z" fill="#5aa9ef"/>
  <path d="M0,150 Q90,138 180,150 T360,150" fill="none" stroke="#3a7bd5" stroke-width="3"/>
  <text x="80" y="185" text-anchor="middle" class="t" fill="#fff">Océano</text>
  <!-- flechas -->
  <g stroke="#2bb673" stroke-width="4" fill="none" marker-end="url(#a)">
    <path d="M96,150 C110,110 120,80 150,66"/>
  </g>
  <g stroke="#3a7bd5" stroke-width="4" fill="none" marker-end="url(#b)">
    <path d="M300,70 C320,110 320,130 300,150"/>
  </g>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2bb673"/></marker>
    <marker id="b" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3a7bd5"/></marker>
  </defs>
  <text x="112" y="104" class="t" fill="#2bb673">Evaporación</text>
  <text x="300" y="118" text-anchor="middle" class="t" fill="#3a7bd5">Lluvia</text>
</svg>
