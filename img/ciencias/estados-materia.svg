<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 150">
  <style>.lbl{font:700 15px -apple-system,sans-serif;fill:#26303b}.sub{font:12px -apple-system,sans-serif;fill:#667}</style>
  <!-- Sólido -->
