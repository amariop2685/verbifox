<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a18">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VerbiFox">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>VerbiFox · Administración</title>
<style>
  :root{ --naranja:#ff7a18; --tinta:#26303b; --verde:#2bb673; --rojo:#e15554; --linea:#dde5ec; --gris:#f6f8fb; }
  *{ box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body{ margin:0; background:var(--gris); color:var(--tinta); }
  header{ background:#26303b; color:#fff; padding:16px 20px; display:flex; align-items:center; gap:10px; }
  header b{ font-size:1.2rem; } header .sp{ flex:1; }
  .salir{ background:rgba(255,255,255,.15); color:#fff; border:0; padding:8px 14px; border-radius:10px; cursor:pointer; }
  .wrap{ max-width:920px; margin:0 auto; padding:18px; }
  .card{ background:#fff; border:1px solid var(--linea); border-radius:14px; padding:18px; margin-bottom:14px; }
  input,select{ width:100%; padding:10px; border:1px solid var(--linea); border-radius:9px; font-size:.95rem; }
  label{ font-size:.8rem; font-weight:600; color:#5a6b7a; display:block; margin:8px 0 3px; }
  button{ cursor:pointer; border:0; border-radius:9px; font-weight:600; }
  .pri{ background:var(--naranja); color:#fff; padding:10px 16px; }
  .sec{ background:#eef2f6; color:#26303b; padding:8px 12px; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
  .row>div{ flex:1; min-width:130px; }
  .pill{ padding:3px 10px; border-radius:999px; font-size:.75rem; font-weight:700; }
  .ok{ background:#e3f7ee; color:var(--verde); } .warn{ background:#fdeceb; color:var(--rojo); } .pend{ background:#fff4e0; color:#c47f12; }
  .ap{ border-left:4px solid var(--naranja); padding-left:14px; margin-bottom:18px; }
  .sub{ background:var(--gris); border-radius:10px; padding:12px; margin-top:8px; font-size:.9rem; }
  .mut{ color:#8294a4; font-size:.85rem; }
  .hidden{ display:none; }
  table{ width:100%; border-collapse:collapse; font-size:.85rem; }
  .tablaWrap{ max-height:62vh; overflow:auto; background:#fff; border:1px solid var(--linea); border-radius:14px; }
  .tablaWrap th{ position:sticky; top:0; background:#eef2f6; text-align:left; padding:10px 12px; z-index:2; border-bottom:1px solid var(--linea); font-size:.78rem; color:#5a6b7a; }
  .tablaWrap td{ padding:10px 12px; border-bottom:1px solid var(--linea); vertical-align:top; }
  tr.fila{ cursor:pointer; } tr.fila:hover{ background:#fbfcfe; }
  #buzon{ max-height:50vh; overflow:auto; }
  .acc{ display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .err{ background:#fdeceb; color:var(--rojo); padding:10px; border-radius:9px; margin-top:8px; }
</style>
</head>
<body>
<header><b>🦊 VerbiFox · Admin</b><span class="sp"></span><button class="salir hidden" id="bs" onclick="salir()">Salir</button></header>
<div class="wrap">

  <div id="login" class="card hidden" style="max-width:380px;margin:40px auto">
    <h2>Acceso administrador</h2>
    <label>Correo</label><input id="email" type="email">
    <label>Contraseña</label>
    <div style="position:relative">
      <input id="pass" type="password" style="padding-right:44px">
      <button type="button" onclick="var i=document.getElementById('pass');var v=i.type==='password';i.type=v?'text':'password';this.textContent=v?'🙈':'👁️'" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:0;font-size:1.2rem;cursor:pointer;padding:6px">👁️</button>
    </div>
    <button class="pri" style="width:100%;margin-top:12px" onclick="entrar()">Ingresar</button>
    <div class="err hidden" id="le"></div>
  </div>

  <div id="noadmin" class="card hidden">
    <h2>Sin permisos</h2>
    <p class="mut">Tu cuenta no es administradora. Si debería serlo, agrega tu UID a la tabla <code>admins</code>.</p>
    <button class="sec" onclick="salir()">Salir</button>
  </div>

  <div id="admin" class="hidden">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 style="margin:0">Apoderados y suscripciones</h2>
        <button class="sec" onclick="cargar()">↻ Actualizar</button>
      </div>
      <div id="resumen" style="margin-top:12px"></div>
      <input id="buscar" placeholder="🔍 Buscar por nombre, RUT o correo…" oninput="onBuscar(this.value)" style="margin-top:12px">
      <div id="filtros" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px"></div>
    </div>
    <div id="lista"></div>

    <div class="card">
      <h2 style="margin-top:0">📨 Buzón PQRS / Soporte</h2>
      <p class="mut">Mensajes de los apoderados (problemas, quejas, sugerencias). Marca como resuelto cuando lo atiendas.</p>
      <button class="sec" onclick="cargarBuzon()">↻ Actualizar buzón</button>
    </div>
    <div id="buzon"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="cloud.js"></script>
<script>
const $=id=>document.getElementById(id);
let DATA={apoderados:[],planes:[]};

function fecha(d){ if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}); }
function pesos(n){ return '$'+(n||0).toLocaleString('es-CL'); }

async function entrar(){
  try{ await VFX.entrar($('email').value.trim(), $('pass').value); arranque(); }
  catch(e){ $('le').textContent='No se pudo: '+e.message; $('le').classList.remove('hidden'); }
}
async function salir(){ await VFX.salir(); location.reload(); }

async function arranque(){
  const s=await VFX.sesion();
  if(!s){ $('login').classList.remove('hidden'); return; }
  const adm=await VFX.soyAdmin();
  $('login').classList.add('hidden');
  $('bs').classList.remove('hidden');
  if(!adm){ $('noadmin').classList.remove('hidden'); return; }
  $('admin').classList.remove('hidden');
  await cargar();
  await cargarBuzon();
}

async function cargarBuzon(){
  const cont=$('buzon'); cont.innerHTML='<div class="card mut">Cargando buzón…</div>';
  let tk=[];
  try{ tk=await VFX.adminTickets(); }catch(e){ cont.innerHTML='<div class="card mut">No se pudo cargar el buzón: '+e.message+'</div>'; return; }
  if(!tk.length){ cont.innerHTML='<div class="card mut">Sin mensajes por ahora. 🎉</div>'; return; }
  const nuevos = tk.filter(t=>t.estado==='nuevo').length;
  cont.innerHTML = (nuevos?`<div class="card" style="background:#fff4e0;color:#c47f12"><b>Tienes ${nuevos} mensaje(s) nuevo(s)</b></div>`:'')
    + tk.map(renderTicket).join('');
}
function fechaHora(d){ return d? new Date(d).toLocaleString('es-CL',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : ''; }
function renderTicket(t){
  const colores={nuevo:'warn',en_proceso:'pend',resuelto:'ok'};
  const pill=`<span class="pill ${colores[t.estado]||'pend'}">${t.estado}</span>`;
  const tipos={problema:'🛠️ Problema',peticion:'🙋 Petición',queja:'😕 Queja',reclamo:'⚠️ Reclamo',sugerencia:'💡 Sugerencia'};
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <b>${tipos[t.tipo]||t.tipo} ${pill}</b>
      <span class="mut">${fechaHora(t.created_at)}</span>
    </div>
    <div class="mut" style="margin:4px 0">${t.nombre||'(sin nombre)'} · ${t.email||'sin correo'}</div>
    ${t.asunto?`<div><b>${t.asunto}</b></div>`:''}
    <div style="margin:6px 0;white-space:pre-wrap">${(t.mensaje||'').replace(/</g,'&lt;')}</div>
    <div class="acc">
      ${t.email?`<a class="sec" style="text-decoration:none;padding:8px 12px" href="mailto:${t.email}?subject=${encodeURIComponent('Respuesta VerbiFox: '+(t.asunto||'tu mensaje'))}">✉️ Responder por correo</a>`:''}
      ${t.estado!=='en_proceso'?`<button class="sec" onclick="estadoTicket(${t.id},'en_proceso')">Marcar en proceso</button>`:''}
      ${t.estado!=='resuelto'?`<button class="sec" onclick="estadoTicket(${t.id},'resuelto')">✅ Marcar resuelto</button>`:''}
    </div>
  </div>`;
}
async function estadoTicket(id, estado){
  try{ await VFX.adminResponderTicket(id,{estado}); await cargarBuzon(); }catch(e){ alert('Error: '+e.message); }
}

let fTexto='', fEstado='todas', limite=30;
const PAGINA=30;
const EST_LABEL={todas:'Todas',activa:'Activas',cortesia:'🎁 Cortesías',pendiente:'Pendientes',vencida:'Sin vigencia',sin:'Sin plan'};

async function cargar(){
  DATA=await VFX.adminTodo();
  render();
}
function render(){ renderResumen(); renderFiltros(); renderLista(); }

function estadoSub(a){
  const s=a.subs||[];
  if(s.some(x=>x.estado==='activa'&&x.cortesia)) return 'cortesia';
  if(s.some(x=>x.estado==='activa')) return 'activa';
  if(s.some(x=>x.estado==='pendiente')) return 'pendiente';
  if(s.some(x=>x.estado==='vencida'||x.estado==='cancelada')) return 'vencida';
  return 'sin';
}
function pillEstado(e){
  const m={activa:['ok','Activa'],cortesia:['ok','🎁 Cortesía'],pendiente:['pend','Pendiente'],vencida:['warn','Sin vigencia'],sin:['pend','Sin plan']};
  const x=m[e]||['pend',e]; return `<span class="pill ${x[0]}">${x[1]}</span>`;
}
function stat(n,l,color){ return `<div style="background:var(--gris);border-radius:10px;padding:10px;text-align:center"><div style="font-size:1.3rem;font-weight:800;${color?'color:'+color:''}">${n}</div><div class="mut" style="font-size:.72rem">${l}</div></div>`; }
function renderResumen(){
  const ap=DATA.apoderados; let activas=0,cort=0,pend=0,ingreso=0;
  for(const a of ap) for(const s of (a.subs||[])){
    if(s.estado==='activa'){ if(s.cortesia) cort++; else { activas++; ingreso+=s.plan?s.plan.precio_clp:0; } }
    else if(s.estado==='pendiente') pend++;
  }
  $('resumen').innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:8px">
    ${stat(ap.length,'Apoderados')}
    ${stat(activas,'Activas pagas','#2bb673')}
    ${stat(cort,'Cortesías')}
    ${stat(pend,'Pendientes','#c47f12')}
    ${stat(pesos(ingreso),'Ingreso/mes est.','#2b7bb6')}
  </div>`;
}
function renderFiltros(){
  const c={todas:DATA.apoderados.length};
  for(const k of ['activa','cortesia','pendiente','vencida','sin']) c[k]=DATA.apoderados.filter(a=>estadoSub(a)===k).length;
  $('filtros').innerHTML=Object.keys(EST_LABEL).map(k=>
    `<button class="${fEstado===k?'pri':'sec'}" onclick="setFiltro('${k}')">${EST_LABEL[k]} (${c[k]||0})</button>`).join('');
}
function setFiltro(k){ fEstado=k; limite=PAGINA; renderFiltros(); renderLista(); }
function onBuscar(v){ fTexto=v; limite=PAGINA; renderLista(); }
function verMas(){ limite+=PAGINA; renderLista(); }

function renderLista(){
  const cont=$('lista');
  if(!DATA.apoderados.length){ cont.innerHTML='<div class="card mut">Aún no hay apoderados. Cuando alguien cree su cuenta, aparece aquí.</div>'; return; }
  const q=fTexto.trim().toLowerCase();
  let ap=DATA.apoderados.filter(a=>{
    if(fEstado!=='todas' && estadoSub(a)!==fEstado) return false;
    if(q){ const t=((a.nombre||'')+' '+(a.email||'')+' '+(a.rut||'')).toLowerCase(); if(!t.includes(q)) return false; }
    return true;
  }).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  if(!ap.length){ cont.innerHTML='<div class="card mut">Nada coincide con el filtro o la búsqueda.</div>'; return; }
  const total=ap.length, visibles=ap.slice(0,limite);
  const masFila = total>limite ? `<tr><td colspan="6" style="padding:0"><button class="sec" style="width:100%;padding:13px;border-radius:0" onclick="verMas()">Mostrar más (${total-limite} restantes)</button></td></tr>` : '';
  cont.innerHTML=`<div class="mut" style="margin:0 2px 8px">Mostrando ${visibles.length} de ${total}${fTexto||fEstado!=='todas'?' (filtrado)':''} · toca una fila para ver el detalle</div>
  <div class="tablaWrap"><table>
    <thead><tr><th>Apoderado</th><th>RUT</th><th>Estudiantes</th><th>Plan</th><th>Estado</th><th></th></tr></thead>
    <tbody>${visibles.map(renderAp).join('')}${masFila}</tbody>
  </table></div>`;
}

function toggleDet(id){
  const d=document.getElementById('det_'+id); if(!d) return;
  d.classList.toggle('hidden');
  const f=document.getElementById('flecha_'+id); if(f) f.textContent=d.classList.contains('hidden')?'▸':'▾';
}

function renderAp(a){
  const est=estadoSub(a);
  const hijos = a.hijos.map(h=>`${h.avatar||''} ${h.nombre}`).join(', ') || '—';
  const subs = a.subs.map(s=>renderSub(s)).join('') || '<p class="mut" style="margin:6px 0">Sin suscripción.</p>';
  const optHijos = a.hijos.map(h=>`<option value="${h.id}">${h.nombre}</option>`).join('');
  const optPlanes = DATA.planes.filter(p=>p.activo)
    .sort((a,b)=> (a.periodo==='anual')-(b.periodo==='anual') || a.precio_clp-b.precio_clp)
    .map(p=>`<option value="${p.id}">${p.nombre} (${pesos(p.precio_clp)}/${p.periodo==='anual'?'año':'mes'})</option>`).join('');
  const planTxt = a.subs.length ? a.subs.map(s=>s.plan?s.plan.nombre:s.plan_id).join(', ') : '—';
  const nom = a.nombre || (a.email?a.email.split('@')[0]:'') || '(sin nombre)';
  return `<tr class="fila" onclick="toggleDet('${a.id}')">
    <td style="min-width:150px"><b>${nom}</b><span class="mut" style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${a.email||''}</span></td>
    <td style="white-space:nowrap">${a.rut||'—'}</td>
    <td>${hijos}</td>
    <td>${planTxt}</td>
    <td>${pillEstado(est)}</td>
    <td id="flecha_${a.id}">▸</td>
  </tr>
  <tr id="det_${a.id}" class="hidden"><td colspan="6" style="background:var(--gris)">
      <div class="mut" style="margin:2px 0 8px">Estudiantes: ${hijos}</div>
      ${subs}
      <details style="margin-top:10px">
        <summary class="sec" style="display:inline-block;padding:8px 12px;border-radius:9px">+ Activar / dar acceso</summary>
        <div class="row" style="margin-top:10px">
          <div><label>Estudiante</label><select id="ns_${a.id}">${optHijos||'<option value="">(sin hijo aún)</option>'}</select></div>
          <div><label>Plan</label><select id="np_${a.id}">${optPlanes}</select></div>
          <div><label>Inicio</label><input type="date" id="nf_${a.id}"></div>
          <div style="flex:0"><label>PAC</label><input type="checkbox" id="npac_${a.id}" style="width:auto;transform:scale(1.4)"></div>
          <div style="flex:0"><label>🎁 Gratis</label><input type="checkbox" id="ncort_${a.id}" style="width:auto;transform:scale(1.4)"></div>
          <div style="flex:0"><button class="pri" onclick="crearSub('${a.id}')">Activar</button></div>
        </div>
      </details>
  </td></tr>`;
}

function renderSub(s){
  const estado = s.estado==='activa'?'<span class="pill ok">Activa</span>':s.estado==='vencida'?'<span class="pill warn">Vencida</span>':'<span class="pill pend">'+s.estado+'</span>';
  const cort = s.cortesia?'<span class="pill ok">🎁 Cortesía</span>':'';
  const pac = s.cobro_automatico?'<span class="pill ok">PAC ON</span>':'<span class="pill pend">PAC OFF</span>';
  const per = s.plan? s.plan.periodo : 'mensual';
  return `<div class="sub">
    <div><b>${s.plan?s.plan.nombre:s.plan_id}</b> ${estado} ${cort} ${pac}</div>
    <div class="mut">Inicio ${fecha(s.fecha_inicio)} · Último pago ${fecha(s.ultimo_pago)} · Próximo ${fecha(s.proximo_pago)}</div>
    <div class="acc">
      <button class="sec" onclick="pagar('${s.id}','${per}', ${s.plan?s.plan.precio_clp:0})">💰 Marcar pago recibido</button>
      <button class="sec" onclick="togglePac('${s.id}', ${s.cobro_automatico})">${s.cobro_automatico?'Apagar PAC':'Encender PAC'}</button>
      <button class="sec" onclick="toggleEstado('${s.id}','${s.estado}')">${s.estado==='activa'?'Suspender':'Reactivar'}</button>
    </div>
  </div>`;
}

let ocupado=false;
async function crearSub(parentId){
  if(ocupado) return; ocupado=true;
  try{
    await VFX.adminCrearSuscripcion({
      parent_id: parentId,
      student_id: $('ns_'+parentId).value || null,
      plan_id: $('np_'+parentId).value,
      fecha_inicio: $('nf_'+parentId).value || null,
      cobro_automatico: $('npac_'+parentId).checked,
      cortesia: $('ncort_'+parentId).checked,
    });
    await cargar();
  }catch(e){ alert('Error: '+e.message); }
  finally{ ocupado=false; }
}
async function pagar(subId, periodo, monto){
  if(ocupado) return;
  if(!confirm('¿Marcar pago recibido por '+pesos(monto)+'? Esto extiende la suscripción un período.')) return;
  ocupado=true;
  try{ await VFX.adminRegistrarPago({ subscription_id:subId, monto_clp:monto }); await cargar(); }
  catch(e){ alert('Error: '+e.message); }
  finally{ ocupado=false; }
}
async function togglePac(subId, actual){ try{ await VFX.adminActualizarSub(subId,{cobro_automatico:!actual}); await cargar(); }catch(e){ alert(e.message); } }
async function toggleEstado(subId, est){ const nuevo= est==='activa'?'cancelada':'activa'; try{ await VFX.adminActualizarSub(subId,{estado:nuevo}); await cargar(); }catch(e){ alert(e.message); } }

document.addEventListener('vfx-listo', arranque);
setTimeout(()=>{ if(window.VFX && $('login').classList.contains('hidden') && $('admin').classList.contains('hidden') && $('noadmin').classList.contains('hidden')) arranque(); }, 1200);
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}</script>
</body>
</html>
