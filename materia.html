<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a18">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VerbiFox">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>VerbiFox · Materia</title>
<style>
  :root{ --naranja:#ff7a18; --naranja2:#ff9d4d; --tinta:#26303b; --verde:#2bb673; --azul:#3a7bd5; --rojo:#e15554; --linea:#e3e9ef; }
  *{ box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body{ margin:0; background:#f6f8fb; color:var(--tinta); }
  header{ background:linear-gradient(135deg,var(--naranja),var(--naranja2)); color:#fff; padding:18px 20px; text-align:center; }
  header .ic{ font-size:2rem; } header h1{ margin:2px 0; font-size:1.3rem; } header p{ margin:0; opacity:.95; font-size:.9rem; }
  .wrap{ max-width:640px; margin:16px auto; padding:0 16px 40px; }
  .btn{ display:block; width:100%; border:0; border-radius:14px; padding:14px; font-size:1rem; font-weight:700; cursor:pointer; margin:8px 0; color:#fff; }
  .b-azul{ background:var(--azul); text-align:left; } .b-verde{ background:var(--verde); } .b-gris{ background:#94a3b8; }
  .card{ background:#fff;border:2px solid var(--linea);border-radius:14px;padding:12px 14px;margin:8px 0; }
  .oa{ background:#fff4e0;border-radius:10px;padding:10px 12px;color:#7c4a03;font-weight:600;font-size:.9rem }
  .item{ display:flex;align-items:center;gap:12px;background:#fff;border:2px solid var(--linea);border-radius:12px;padding:10px 12px;margin:6px 0;cursor:pointer }
  .item .e{ font-size:1.7rem } .item .en{ color:var(--azul);font-weight:600 } .item .d{ font-size:.85rem;color:#667 }
  .mut{ color:#8294a4; font-size:.9rem }
  h2{ font-size:1.15rem } h3{ margin:12px 0 4px }
  .op{ background:var(--azul); color:#fff; border:0; border-radius:12px; padding:13px; width:100%; margin:6px 0; cursor:pointer; font-size:.98rem }
  .res{ text-align:center;background:#e3f7ee;border-radius:12px;padding:18px;font-weight:800;color:var(--verde) }
  .back{ background:#eef2f6;color:#26303b;border:0;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer;margin-bottom:10px }
  .bar{ height:8px;background:#eef1f4;border-radius:6px;overflow:hidden;margin-top:6px } .bar>i{ display:block;height:100%;background:linear-gradient(90deg,#2bb673,#7ad6a8) }
  .diag{ width:100%;max-width:360px;display:block;margin:10px auto;background:#fff;border-radius:12px;border:1px solid var(--linea);padding:6px }
</style>
<link rel="stylesheet" href="ui.css">
</head>
<body>
<header>
  <div class="ic" id="h-ic">📚</div>
  <h1 id="h-nom">Materia</h1>
  <p id="h-curso"></p>
</header>
<div class="wrap">
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <button class="back" onclick="location.href='inicio.html'">← Mis materias</button>
    <button id="btnLeer" onclick="toggleLeer()" title="La app te lee todo en voz alta"
      style="border:0;border-radius:12px;padding:9px 14px;font-weight:800;cursor:pointer;background:#2bb673;color:#fff">🔊 Me leen: SÍ</button>
  </div>
  <div id="app"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="cloud.js"></script>
<script src="caballero.js"></script>
<script src="contenido.js"></script>
<script>
  const $=id=>document.getElementById(id);
  const params=new URLSearchParams(location.search);
  const M=params.get('m');
  let G=(params.get('g')||'5').replace(/\D/g,'')||'5';
  // Con un niño activo, su curso es FIJO (el que inscribió el apoderado), aunque cambien la URL
  try{
    if(window.VFX && VFX.studentActivo && VFX.studentActivo()){
      const c=(localStorage.getItem('vfx_curso')||'').match(/[1-6]/);
      if(c) G=c[0];
    }
  }catch(e){}
  const mat = (window.CONTENIDO||{})[M];
  let unidades = mat && mat.cursos ? (mat.cursos[G]||[]) : [];
  let uActual=null, q=null;

  function mezcla(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }
  function elegir(a){ return a[Math.floor(Math.random()*a.length)]; }
  function sinOA(s){ return (s||'').replace(/^OA[^:]*:\s*/i,'').replace(/\s*\(OA[^)]*\)/gi,''); } // oculta códigos de objetivo
  // ===== LECTURA EN VOZ ALTA (para los que aún no leen: 1° a 4°) =====
  function limpiaTxt(s){ return String(s==null?'':s).replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim(); }
  function gradoNum(){ return parseInt(String(G).replace(/\D/g,''),10)||5; }
  // ¿La app lee sola? Por defecto SÍ en 1°-4°. El niño/apoderado puede cambiarlo (vfx_leer).
  function leeSolo(){
    try{ const m=localStorage.getItem('vfx_leer'); if(m==='1') return true; if(m==='0') return false; }catch(e){}
    return gradoNum()<=4;
  }
  function vozEncendida(){ try{ return localStorage.getItem('mate_voz')!=='0'; }catch(e){ return true; } }
  function _vozPref(){
    try{
      const vs=(speechSynthesis.getVoices()||[]);
      const pref=(mat&&mat.lang&&/^en/i.test(mat.lang)) ? 'en' : 'es';
      const nom=localStorage.getItem(pref==='en'?'vozIngles':'mate_voz_nombre')||'';
      if(nom){ const v=vs.find(x=>x.name===nom); if(v) return v; }
      const cand=vs.filter(v=>new RegExp('^'+pref,'i').test(v.lang||''));
      return cand.find(v=>/google|siri|premium|enhanced|natural/i.test(v.name||'')) || cand[0] || null;
    }catch(e){ return null; }
  }
  // Habla y avisa cuando termina (para poder preguntarle después)
  function decirCB(txt, cb){
    try{
      if(!('speechSynthesis'in window) || !vozEncendida()){ if(cb) cb(); return; }
      const t=limpiaTxt(txt); if(!t){ if(cb) cb(); return; }
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(t);
      const v=_vozPref();
      if(v){ u.voice=v; u.lang=v.lang; } else { u.lang=(mat&&mat.lang)||'es-CL'; }
      u.rate = gradoNum()<=2 ? 0.85 : (gradoNum()<=4 ? 0.92 : 1);  // más lento para los más chicos
      if(cb) u.onend=()=>cb();
      speechSynthesis.speak(u);
    }catch(e){ if(cb) cb(); }
  }
  function decir(txt){ decirCB(txt, null); }

  // ===== El niño puede responder HABLANDO (opcional, pide permiso del micrófono) =====
  let _rec=null;
  function micDisponible(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
  function micActivo(){ try{ return localStorage.getItem('vfx_mic')==='1'; }catch(e){ return false; } }
  function pararMic(){ try{ if(_rec) _rec.abort(); }catch(e){} _rec=null; }
  function escucharSiNo(onSi, onNo){
    if(!micDisponible() || !micActivo()) return;
    try{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      pararMic();
      _rec=new SR(); _rec.lang='es-CL'; _rec.interimResults=false; _rec.maxAlternatives=3;
      _rec.onresult=ev=>{
        const t=((ev.results[0][0].transcript)||'').toLowerCase();
        if(/otra vez|de nuevo|repite|repetir|no entend|nada|no/.test(t)){ if(onNo) onNo(); }
        else if(/s[ií]|entend|listo|sigue|siguiente|ya/.test(t)){ if(onSi) onSi(); }
      };
      _rec.onerror=()=>{}; _rec.onend=()=>{ _rec=null; };
      _rec.start();
    }catch(e){}
  }
  function toggleMic(){
    const on=!micActivo();
    try{ localStorage.setItem('vfx_mic', on?'1':'0'); }catch(e){}
    if(!on) pararMic();
    pintarBotonMic();
    if(on) decir('Listo. Ahora puedes contestarme hablando: di sí, o di otra vez.');
  }
  function pintarBotonMic(){
    document.querySelectorAll('[data-mic]').forEach(b=>{
      b.textContent = micActivo() ? '🎤 Hablar: SÍ' : '🎤 Hablar: NO';
      b.style.background = micActivo() ? '#2bb673' : '#dbe3ec';
      b.style.color = micActivo() ? '#fff' : '#26303b';
    });
  }
  function decirItem(i){ const it=uActual.items[i]; if(it) decir(it.t+'. '+it.d); }
  // Arma el texto hablado de una pregunta (enunciado + alternativas)
  function textoPregunta(p){
    let t=limpiaTxt(p.prompt)+'. '+limpiaTxt(p.sub)+'. ';
    if(p.tipo==='vf') t+='¿Es verdadero o falso?';
    else if(p.tipo==='escribe') t+='Escribe tu respuesta.';
    else if(p.ops) t+=p.ops.map((o,i)=>'Opción '+(i+1)+': '+limpiaTxt(o.text)).join('. ');
    return t;
  }
  function repetirPregunta(){ const p=q&&q.preg&&q.preg[q.i]; if(p) decir(textoPregunta(p)); }
  // El niño elige QUÉ parte quiere que le lean
  function leerParte(cual){
    const p=q&&q.preg&&q.preg[q.i]; if(!p) return;
    if(cual==='pregunta') decir(limpiaTxt(p.prompt)+'. '+limpiaTxt(p.sub));
    else if(cual==='opciones' && p.ops) decir(p.ops.map((o,i)=>'Opción '+(i+1)+': '+limpiaTxt(o.text)).join('. '));
  }
  function toggleLeer(){
    const nuevo = leeSolo() ? '0' : '1';
    try{ localStorage.setItem('vfx_leer', nuevo); }catch(e){}
    if(nuevo==='0'){ try{ speechSynthesis.cancel(); }catch(e){} }
    pintarBotonLeer();
    if(nuevo==='1') repetirPregunta();
  }
  function pintarBotonLeer(){
    const b=document.getElementById('btnLeer'); if(!b) return;
    const on=leeSolo();
    b.textContent = on ? '🔊 Me leen: SÍ' : '🔇 Me leen: NO';
    b.style.background = on ? '#2bb673' : '#dbe3ec';
    b.style.color = on ? '#fff' : '#26303b';
  }

  // ---- Tutor adaptativo: dominio por CONCEPTO + repetición espaciada ----
  function mlKey(){ return 'vfx_ml_'+M+'_'+G; }
  function loadML(){ try{ return JSON.parse(localStorage.getItem(mlKey())||'{}'); }catch(e){ return {}; } }
  function saveML(d){ try{ localStorage.setItem(mlKey(), JSON.stringify(d)); }catch(e){} }
  function cUpdate(uid,t,ok){ if(!t) return; const d=loadML(); d[uid]=d[uid]||{}; d[uid][t]=Math.max(0,Math.min(4,(d[uid][t]||0)+(ok?1:-1))); saveML(d); }
  function unitMastery(u){ const m=loadML()[u.id]||{}; if(!u.items.length) return 0; let dom=0; for(const it of u.items) if((m[it.t]||0)>=3) dom++; return dom/u.items.length; }
  function expertoDesbloqueado(u){ return unitMastery(u) >= 0.9; }
  // Premio único al caballero por dominar una unidad (90%)
  function bonusKey(){ return 'vfx_bonus_'+M+'_'+G; }
  function yaBonus(uid){ try{ return JSON.parse(localStorage.getItem(bonusKey())||'[]').includes(uid); }catch(e){ return false; } }
  function marcarBonus(uid){ try{ const a=JSON.parse(localStorage.getItem(bonusKey())||'[]'); if(!a.includes(uid)){ a.push(uid); localStorage.setItem(bonusKey(),JSON.stringify(a)); } }catch(e){} }

  // ===== VIAJE GUIADO: la app conduce al niño a la siguiente actividad =====
  function lecKey(){ return 'vfx_lec_'+M+'_'+G; }
  function lecDone(uid){ try{ return JSON.parse(localStorage.getItem(lecKey())||'[]').includes(uid); }catch(e){ return false; } }
  function marcarLec(uid){ try{ const a=JSON.parse(localStorage.getItem(lecKey())||'[]'); if(!a.includes(uid)){ a.push(uid); localStorage.setItem(lecKey(),JSON.stringify(a)); } }catch(e){} }
  function pracKey(){ return 'vfx_prac_'+M+'_'+G; }
  function pracCount(uid){ try{ return (JSON.parse(localStorage.getItem(pracKey())||'{}'))[uid]||0; }catch(e){ return 0; } }
  function marcarPrac(uid){ try{ const d=JSON.parse(localStorage.getItem(pracKey())||'{}'); d[uid]=(d[uid]||0)+1; localStorage.setItem(pracKey(),JSON.stringify(d)); }catch(e){} }
  function pasoDe(u){
    if(!lecDone(u.id)) return 'leccion';
    if(pracCount(u.id)<1) return 'practica';
    if(mejorExamen(u.id)<60) return 'prueba';
    return 'completa';
  }
  const PASO_TXT={leccion:'📖 la lección', practica:'🎮 practicar', prueba:'📝 la prueba', completa:'✅ completada'};
  function guardaRuta(u,paso){ try{ localStorage.setItem('vfx_ruta', JSON.stringify({m:M,g:G,uid:u?u.id:null,paso,materia:mat.nombre,emoji:(u&&u.emoji)||mat.emoji,unidad:u?u.nombre:''})); }catch(e){} }
  function unidadSiguiente(u){
    const i=unidades.indexOf(u);
    for(let k=1;k<=unidades.length;k++){ const c=unidades[(i+k)%unidades.length]; if(pasoDe(c)!=='completa') return c; }
    return null;
  }
  function irPaso(u,paso){
    uActual=u; guardaRuta(u,paso);
    if(paso==='leccion') leccion(); else if(paso==='practica') quizPractica(); else if(paso==='prueba') confirmExamen(); else abrir(u.id);
  }
  // Cuenta regresiva que lleva SOLA a la siguiente actividad (con opción de elegir otra cosa)
  let _auto=null;
  function pararAuto(){ if(_auto){ clearInterval(_auto); _auto=null; } }
  function autoNext(titulo, fn, segs){
    pararAuto(); let s=segs||5;
    window._autoGo=()=>{ pararAuto(); fn(); };
    window._autoCancel=()=>{ pararAuto(); abrir(uActual.id); };
    _auto=setInterval(()=>{ s--; const el=$('cuenta'); if(el) el.textContent=s; if(s<=0){ pararAuto(); fn(); } },1000);
    return `<div class="card vfx-pop" style="background:#eef7ff;text-align:center;border:2px solid #9cc4f0">
      <div style="font-weight:800;font-size:1.05rem">Siguiente: ${titulo}</div>
      <div class="mut">Continuamos en <b id="cuenta" style="font-size:1.2rem;color:var(--azul)">${s}</b>…</div>
      <button class="btn b-verde" style="margin-top:8px" onclick="_autoGo()">▶ ¡Vamos ya!</button>
      <button class="btn b-gris" onclick="_autoCancel()">Elegir otra cosa</button>
    </div>`;
  }

  function init(){
    if(!mat){ $('app').innerHTML='<div class="card">Materia no encontrada.</div>'; return; }
    $('h-ic').textContent=mat.emoji||'📚'; $('h-nom').textContent=mat.nombre; $('h-curso').textContent=G+'° Básico';
    document.title='VerbiFox · '+mat.nombre;
    pintarBotonLeer();
    // las voces del aparato llegan con retraso: refrescamos cuando estén
    try{ if('speechSynthesis'in window) speechSynthesis.onvoiceschanged=()=>{}; }catch(e){}
    // ¿viene desde "Continuar donde quedé"? → directo a la actividad
    const uidP=params.get('u'), pasoP=params.get('paso');
    const uP=uidP && unidades.find(x=>x.id===uidP);
    if(uP){ irPaso(uP, pasoP && pasoP!=='completa' ? pasoP : pasoDe(uP)); return; }
    verUnidades();
  }
  function verUnidades(){
    pararAuto();
    if(!unidades.length){ $('app').innerHTML='<div class="card mut">Contenido de este curso en preparación. 🌱</div>'; return; }
    // ¿dónde seguir? → la primera unidad no completada
    const sig = unidades.find(u=>pasoDe(u)!=='completa');
    const hero = sig
      ? `<button class="btn vfx-pop" style="background:linear-gradient(135deg,#2bb673,#57cf95);color:#fff;font-size:1.1rem;padding:18px" onclick="irPaso(unidades.find(x=>x.id==='${sig.id}'),'${pasoDe(sig)}')">▶ CONTINUAR: ${sig.emoji} ${sig.nombre}<br><span style="font-size:.85rem;font-weight:600">te toca ${PASO_TXT[pasoDe(sig)]}</span></button>`
      : `<div class="res vfx-celebrate">🏆 ¡Completaste TODA la materia! Puedes repasar cualquier unidad.</div>`;
    $('app').innerHTML = hero + '<p class="mut" style="margin-top:12px">O elige una unidad:</p>' + unidades.map((u,i)=>{
      const pct=Math.round(unitMastery(u)*100);
      const paso=pasoDe(u);
      const marca = paso==='completa'?'✅':(pct>=60?'🌟':pct>=30?'⭐':'');
      return `<button class="btn b-azul vfx-up" style="animation-delay:${i*50}ms" onclick="abrir('${u.id}')">${u.emoji} ${u.nombre} ${marca}
        <div class="bar"><i style="width:${pct}%"></i></div></button>`;
    }).join('');
  }
  function abrir(id){
    pararAuto();
    const u=unidades.find(x=>x.id===id); if(!u) return; uActual=u;
    const img=u.img?`<img class="diag" src="${u.img}" alt="${u.nombre}">`:'';
    const items=u.items.map((it,i)=>`<div class="item vfx-up" style="animation-delay:${i*45}ms" onclick="decirItem(${i})">
      <span class="e">${it.e||'•'}</span>
      <div><b>${it.t}</b>${it.en?` · <span class="en">${it.en}</span>`:''} 🔊<div class="d">${it.d}</div></div></div>`).join('');
    const datos=(u.datos||[]).map(d=>`<div class="card" style="background:#f0f6ff">💡 ${d}</div>`).join('');
    const hayRetos=(u.retos&&u.retos.length);
    $('app').innerHTML=`<button class="back" onclick="verUnidades()">← Unidades</button>
      <h2>${u.emoji} ${u.nombre}</h2>
      <div class="oa">🎯 ${sinOA(u.oa)}</div>
      ${u.intro?`<p class="mut" style="margin:8px 0">${u.intro}</p>`:''}
      ${img}
      <h3>Conceptos <span class="mut" style="font-weight:400">· español · <span class="en">inglés</span> · toca 🔊</span></h3>${items}
      ${datos?('<h3>¿Sabías que…? 🌍</h3>'+datos):''}
      <div class="bar" style="margin-top:8px"><i style="width:${Math.round(unitMastery(u)*100)}%"></i></div>
      <p class="mut" style="text-align:center;margin:4px 0 8px">Dominio: <b>${Math.round(unitMastery(u)*100)}%</b>${mejorExamen(u.id)?' · 📝 Mejor prueba: '+mejorExamen(u.id)+'%':''}</p>
      ${botonPaso(u,'leccion','#8b5cf6','📖 1. Aprender la lección')}
      ${botonPaso(u,'practica','#2bb673','🎮 2. Practicar ('+N_PRACTICA+' preguntas)')}
      ${botonPaso(u,'prueba','#e15554','📝 3. Prueba del tema ('+N_EXAMEN+' preguntas · '+Math.round(N_EXAMEN*SEG_POR_PREG/60)+' min ⏱️)')}`;
  }
  function botonPaso(u,paso,color,texto){
    const rec = pasoDe(u)===paso;
    const badge = rec ? '<span style="display:block;font-size:.78rem;font-weight:800;letter-spacing:.5px">▶ SIGUE AQUÍ</span>' : '';
    const hecho = (paso==='leccion'&&lecDone(u.id))||(paso==='practica'&&pracCount(u.id)>0)||(paso==='prueba'&&mejorExamen(u.id)>=60);
    return `<button class="btn ${rec?'vfx-ok':''}" style="background:${color};color:#fff;${rec?'font-size:1.06rem;padding:16px;border:3px solid #ffd23f':''};${!rec&&hecho?'opacity:.75':''}" onclick="irPaso(unidades.find(x=>x.id==='${u.id}'),'${paso}')">${badge}${texto}${hecho?' ✅':''}</button>`;
  }

  // ===== MOTOR: Lección → Práctica → Prueba (sin repetir preguntas) =====
  const N_PRACTICA=20, N_EXAMEN=20, SEG_POR_PREG=60;

  function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9ñ ]/g,'').trim(); }
  function aceptables(it){
    const a=new Set();
    (it.t||'').split('/').forEach(x=>{ const n=norm(x.split('(')[0]); if(n) a.add(n); });
    const par=((it.t||'').match(/\(([^)]+)\)/)||[])[1]; if(par) par.split('/').forEach(x=>{ const n=norm(x); if(n) a.add(n); });
    return [...a].filter(Boolean);
  }

  // -- BANCO grande de preguntas por unidad (cada una con clave estable) --
  function bancoDe(u, examen){
    const qs=[]; const items=u.items||[];
    const distr=(it,campo)=>mezcla(items.filter(x=>x!==it)).slice(0,3).map(x=>({text:x[campo],ok:false}));
    for(const it of items){
      qs.push({key:'mc:'+it.t, tipo:'ops', concepto:it.t, emoji:it.e, prompt:it.t+(it.en?` <span class="en">(${it.en})</span>`:''), sub:'¿Qué es?', ops:mezcla([{text:it.d,ok:true},...distr(it,'d')]), porque:it.t+': '+it.d});
      qs.push({key:'inv:'+it.t, tipo:'ops', concepto:it.t, emoji:it.e, prompt:it.d, sub:'¿Qué concepto es?', ops:mezcla([{text:it.t,ok:true},...distr(it,'t')]), porque:it.t+': '+it.d});
      if(it.en) qs.push({key:'bil:'+it.t, tipo:'ops', concepto:it.t, emoji:'🇬🇧', prompt:`<span class="en">${it.en}</span>`, sub:'What is it? (elige en español)', ops:mezcla([{text:it.d,ok:true},...distr(it,'d')]), porque:it.en+' = '+it.t+': '+it.d});
      qs.push({key:'vft:'+it.t, tipo:'vf', vf:true, concepto:it.t, emoji:'🤔', prompt:`<b>${it.t}</b>: “${it.d}”`, sub:'¿Verdadero o falso?', porque:'VERDADERO. '+it.t+': '+it.d});
      const otro=elegir(items.filter(x=>x!==it));
      if(otro) qs.push({key:'vff:'+it.t, tipo:'vf', vf:false, concepto:it.t, emoji:'🤔', prompt:`<b>${it.t}</b>: “${otro.d}”`, sub:'¿Verdadero o falso?', porque:'FALSO. Esa es la definición de '+otro.t+'. '+it.t+': '+it.d});
      const main=(it.t||'').split('(')[0].trim();
      if(main.length<=14 && main.split(' ').length<=2)
        qs.push({key:'esc:'+it.t, tipo:'escribe', concepto:it.t, emoji:'⌨️', prompt:it.d, sub:'✏️ Escribe el concepto', resp:aceptables(it), muestra:main, porque:it.t+': '+it.d});
    }
    (u.retos||[]).forEach((r,i)=>qs.push({key:'reto:'+i, tipo:'ops', concepto:null, emoji:'🏆', prompt:r.q, sub:'🏆 Reto de campeón', ops:mezcla(r.ops.map((o,k)=>({text:o,ok:k===r.correcta}))), porque:r.porque}));
    if(examen && mat.avanzado && mat.avanzado[G])
      mat.avanzado[G].forEach((r,i)=>qs.push({key:'exp:'+i, tipo:'ops', concepto:null, emoji:'🧠', prompt:r.q, sub:'🧠 Reto experto', ops:mezcla(r.ops.map((o,k)=>({text:o,ok:k===r.correcta}))), porque:r.porque}));
    return qs;
  }

  // -- SIN REPETIR: registra qué preguntas ya salieron; al agotar el banco, reinicia el ciclo --
  function seenKey(uid){ return 'vfx_seen_'+M+'_'+G+'_'+uid; }
  function getSeen(uid){ try{ return JSON.parse(localStorage.getItem(seenKey(uid))||'[]'); }catch(e){ return []; } }
  function marcarVisto(uid,key){ try{ const a=getSeen(uid); if(!a.includes(key)){ a.push(key); localStorage.setItem(seenKey(uid),JSON.stringify(a)); } }catch(e){} }
  function muestrear(u, n, examen){
    const pool=bancoDe(u, examen);
    const seen=getSeen(u.id);
    const libres=pool.filter(p=>!seen.includes(p.key));
    const m=loadML()[u.id]||{};
    const peso=p=>(p.concepto?(m[p.concepto]||0):2)+Math.random()*1.6; // lo débil sale primero
    const toma=(arr,k)=>arr.map(p=>({p,w:peso(p)})).sort((a,b)=>a.w-b.w).slice(0,k).map(x=>x.p);
    let sel;
    if(libres.length>=Math.min(n,pool.length)){
      sel=toma(libres,n);
    } else {
      sel=[...libres]; // primero TODAS las que nunca han salido
      try{ localStorage.removeItem(seenKey(u.id)); }catch(e){} // ciclo completo → reinicia
      const resto=pool.filter(p=>!sel.some(s=>s.key===p.key));
      sel=sel.concat(toma(resto, Math.max(0, Math.min(n-sel.length, resto.length))));
    }
    return sel.slice(0,n).sort(()=>Math.random()-0.5);
  }

  // ===== 1) LECCIÓN: enseñar paso a paso =====
  let lec=null;

    s.push({html:`<div style="text-align:center;font-size:3rem">🎉</div><h2 style="text-align:center">¡Lección completa!</h2><p class="mut" style="text-align:center">Ahora practica: cada vez que juegues saldrán <b>preguntas distintas</b> del mismo tema.</p>`, di:'¡Lección completa! Ahora a practicar.', fin:true});
    lec={slides:s,i:0}; guardaRuta(uActual,'leccion'); renderLeccion();

  function renderLeccion(){

    $('app').innerHTML=`<button class="back" onclick="abrir('${uActual.id}')">← Salir</button>

        <div class="mut" style="margin-top:4px;font-size:.8rem">Si lo enciendes, puedes contestar diciendo “sí” o “otra vez”.</div>`:''}
      </div>

        ${lec.i<lec.slides.length-1?'<button class="btn b-verde" style="flex:1;margin:0" onclick="lecMueve(1)">Siguiente →</button>':''}

  function ocultarAsk(){ const el=document.getElementById('askLeer'); if(el) el.style.display='none'; pararMic(); }
  function mostrarAskLec(){
    const el=document.getElementById('askLeer'); if(!el) return;

    decirCB('¿Entendiste? Toca sí, o toca: léelo otra vez.', ()=>escucharSiNo(lecSiEntendi, lecOtraVez));

  // ===== 2) PRÁCTICA (20 preguntas variadas, con explicación) =====

  function examen(){
    q={preg:muestrear(uActual,N_EXAMEN,true), i:0, ok:0, modo:'examen', falladas:[]};
    q.fin=Date.now()+q.preg.length*SEG_POR_PREG*1000;

  function pintaReloj(){
    const el=$('reloj'); if(!el||!q||!q.fin) return;
    const s=Math.max(0,Math.round((q.fin-Date.now())/1000));
    el.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
    if(s<=60) el.style.color='#ff9d9d';
    if(s<=0){ finExamen(true); return; }
    clearTimeout(q._t); q._t=setTimeout(pintaReloj,500);

  // ===== Render y respuesta (tipos: opciones, verdadero/falso, escribir) =====
  function render(){
    pararAuto();
    if(q.i>=q.preg.length){ q.modo==='examen'?finExamen(false):finPractica(); return; }
    const p=q.preg[q.i];
    const head = q.modo==='examen'
      ? `<div style="position:sticky;top:0;background:#26303b;color:#fff;border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;font-weight:700;z-index:5"><span>📝 ${q.i+1}/${q.preg.length}</span><span id="reloj">--:--</span></div>`
      : `<p class="mut">Pregunta ${q.i+1} de ${q.preg.length}</p>`;
    let cuerpo='';
    if(p.tipo==='vf'){
      cuerpo=`<div style="display:flex;gap:10px"><button class="op" style="flex:1;background:var(--verde)" onclick="resp(true)">✔ Verdadero</button><button class="op" style="flex:1;background:var(--rojo)" onclick="resp(false)">✘ Falso</button></div>`;
    } else if(p.tipo==='escribe'){
      cuerpo=`<input id="respTxt" autocomplete="off" autocapitalize="off" style="width:100%;padding:13px;border:2px solid var(--linea);border-radius:12px;font-size:1.05rem" placeholder="Escribe aquí…" onkeydown="if(event.key==='Enter')resp('txt')">
        <button class="op" style="margin-top:8px" onclick="resp('txt')">Responder ✔</button>`;
    } else {
      cuerpo=p.ops.map((o,k)=>`<button class="op vfx-up" style="animation-delay:${k*50}ms" onclick="resp(${k})">${o.text}<span onclick="event.stopPropagation();decir(this.dataset.t)" data-t="${limpiaTxt(o.text).replace(/"/g,'&quot;')}" style="opacity:.65;margin-left:8px;cursor:pointer" title="Escuchar esta opción">🔊</span></button>`).join('');
    }
    $('app').innerHTML=`${head}
      <div style="text-align:center;font-size:2rem" class="vfx-pop">${p.emoji||'❓'}</div>
      <h2 style="text-align:center" class="vfx-up">${p.prompt}</h2>
      <p style="text-align:center" class="mut">${p.sub}</p>${cuerpo}
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px">
        <button class="btn b-gris" style="margin:0;flex:1;min-width:130px" onclick="repetirPregunta()">🔁 Léelo todo</button>
        <button class="btn b-gris" style="margin:0;flex:1;min-width:130px" onclick="leerParte('pregunta')">🔊 Solo la pregunta</button>
        ${p.tipo==='ops'?`<button class="btn b-gris" style="margin:0;flex:1;min-width:130px" onclick="leerParte('opciones')">🔊 Solo las alternativas</button>`:''}
      </div>`;
    if(q.modo==='examen') pintaReloj();
    if(p.tipo==='escribe'){ const el=$('respTxt'); if(el) setTimeout(()=>el.focus(),60); }
    if(leeSolo()) setTimeout(()=>decir(textoPregunta(p)), 260);   // la app le lee la pregunta
  }
  function resp(k){
    const p=q.preg[q.i]; let ok=false;
    if(p.tipo==='vf'){ ok=(k===p.vf); }
    else if(p.tipo==='escribe'){ const v=norm(($('respTxt')||{}).value||''); if(!v) return; ok=p.resp.includes(v); }
    else {
      ok=p.ops[k].ok;
      const btns=[...document.querySelectorAll('#app .op')];
      btns.forEach((b,idx)=>{ b.disabled=true; if(p.ops[idx]&&p.ops[idx].ok) b.classList.add('op-correcta'); });
      if(btns[k]){ if(ok) btns[k].classList.add('vfx-ok'); else btns[k].classList.add('op-incorrecta','vfx-shake'); }
    }
    if(!String(p.key||'').startsWith('ia:')) marcarVisto(uActual.id, p.key);
    cUpdate(uActual.id, p.concepto, ok);
    if(ok) q.ok++; else q.falladas.push(p);
    if(q.modo==='examen'){ setTimeout(()=>{ q.i++; render(); }, p.tipo==='ops'?500:200); }
    else setTimeout(()=>mostrarPorque(p, ok), ok?700:950);
  }
  function mostrarPorque(p, ok){
    const correcta = p.tipo==='vf' ? (p.vf?'Verdadero':'Falso') : (p.tipo==='escribe' ? p.muestra : '');
    $('app').innerHTML=`<div style="text-align:center;font-size:2.6rem" class="vfx-celebrate">${ok?'✅':'❌'}</div>
      <h2 style="text-align:center;color:${ok?'var(--verde)':'var(--rojo)'}" class="vfx-up">${ok?elegir(['¡Correcto!','¡Muy bien!','¡Excelente!','¡Crack!']):'Casi… ¡así se aprende!'}</h2>
      ${!ok&&correcta?`<p style="text-align:center;font-weight:800;color:var(--verde)">Respuesta: ${correcta}</p>`:''}
      <div class="card vfx-up" style="background:#f0f6ff">💡 <b>Por qué:</b> ${sinOA(p.porque)}</div>
      <button class="btn b-gris" onclick="decir(${JSON.stringify((ok?'¡Correcto! ':'Casi. ')+(correcta?('La respuesta es '+correcta+'. '):'')+limpiaTxt(sinOA(p.porque)))})">🔊 Escuchar de nuevo</button>
      <button class="btn b-verde vfx-up" onclick="siguiente()">Siguiente ▶</button>`;
    if(leeSolo()) setTimeout(()=>decir((ok?'¡Correcto! ':'Casi. ')+(correcta?('La respuesta es '+correcta+'. '):'')+limpiaTxt(sinOA(p.porque))), 260);
  }
  function siguiente(){ q.i++; render(); }

  function finPractica(){
    marcarPrac(uActual.id);

      <p class="mut" style="text-align:center;margin-top:6px">Dominio de la unidad: <b>${mast}%</b></p>
      ${bonusMsg}

      <button class="btn b-verde" onclick="quizPractica()">🔁 Seguir practicando (preguntas nuevas)</button>

      <button class="btn b-gris" onclick="abrir('${uActual.id}')">← Volver a la unidad</button>`;
  }

  function exscKey(){ return 'vfx_exsc_'+M+'_'+G; }
  function mejorExamen(uid){ try{ return (JSON.parse(localStorage.getItem(exscKey())||'{}'))[uid]||0; }catch(e){ return 0; } }
  function guardaExamen(uid,pct){ try{ const d=JSON.parse(localStorage.getItem(exscKey())||'{}'); d[uid]=Math.max(d[uid]||0,pct); localStorage.setItem(exscKey(),JSON.stringify(d)); }catch(e){} }
  function finExamen(agotado){
    if(q._t) clearTimeout(q._t);
    const total=q.preg.length, pct=Math.round(q.ok/total*100), aprueba=pct>=60;
    guardaExamen(uActual.id,pct);
    let conquista='';
    try{
      const kk='vfx_examok_'+M+'_'+G;
      const done=JSON.parse(localStorage.getItem(kk)||'[]');
      if(aprueba && !done.includes(uActual.id) && window.Caballero){
        done.push(uActual.id); localStorage.setItem(kk,JSON.stringify(done));
        const rc=Caballero.conquistar(mat.nombre+' — '+uActual.nombre+' ('+pct+'%)');
        conquista=`<div class="card vfx-pop" style="background:#fff7e6;color:#7c4a03;text-align:center;font-weight:800">🏰 ¡Conquista para tu Caballero! ${rc.piezaNueva?('Ganaste '+Caballero.nombrePieza(rc.piezaNueva,1)+' 🛡️ (+2 💎)'):'+2 💎'}${rc.ganoSobre?' · 🎟️ ¡y un sobre!':''}</div>`;
      }
    }catch(e){}
    const rev=q.falladas.length?('<h3>Para repasar 📌</h3>'+q.falladas.map(p=>`<div class="card" style="background:#fdf0ef"><div>${p.prompt}</div><div style="color:var(--verde);font-weight:800;margin-top:4px">✔ ${p.tipo==='vf'?(p.vf?'Verdadero':'Falso'):(p.tipo==='escribe'?p.muestra:((p.ops.find(o=>o.ok)||{}).text||''))}</div><div class="mut">${sinOA(p.porque)}</div></div>`).join('')):'';
    // La app conduce SOLA a lo que sigue
    let autoHtml='';
    const espera = q.falladas.length ? 15 : 5; // si hay fallos que revisar, damos más tiempo
    if(aprueba){
      const next=unidadSiguiente(uActual);
      if(next) autoHtml=autoNext(`${next.emoji} ${next.nombre} (nueva aventura 📖)`, ()=>irPaso(next,'leccion'), espera);
      else autoHtml=autoNext('🏫 ¡Materia completa! Elegir otra materia', ()=>{ location.href='inicio.html'; }, espera);
    } else {
      autoHtml=autoNext('🎮 Practicar un poco más (con otras preguntas)', ()=>irPaso(uActual,'practica'), espera);
    }
    $('app').innerHTML=`${agotado?'<div class="card" style="background:#fdeceb;color:#c0392b;text-align:center;font-weight:800">⏱️ ¡Se acabó el tiempo!</div>':''}
      <div class="res vfx-celebrate">${aprueba?'🎉':'💪'} ${q.ok}/${total} correctas (${pct}%)<div style="font-size:.95rem;margin-top:4px;color:#557">${aprueba?'¡PRUEBA APROBADA! 🌟':'Necesitas 60%. Practica un poco más y vuelve: saldrán otras preguntas.'}</div></div>
      ${conquista}
      ${autoHtml}
      ${rev}
      ${aprueba?'<button class="btn" style="background:#e15554;color:#fff" onclick="confirmExamen()">📝 Repetir la prueba (otras preguntas)</button>':''}
      <button class="btn b-gris" onclick="abrir('${uActual.id}')">← Volver a la unidad</button>`;
  }

  // ===== Tutor IA en vivo (se activa solo cuando exista la función tutor-ia) =====
  async function pedirIA(){
    try{
      if(!window.VFX || !window.VERBIFOX_SUPABASE_URL) return null;
      const s=await VFX.sesion(); if(!s) return null;
      const m=loadML()[uActual.id]||{};
      const debiles=uActual.items.filter(it=>(m[it.t]||0)<2).map(it=>it.t).slice(0,5);
      const r=await fetch(window.VERBIFOX_SUPABASE_URL+'/functions/v1/tutor-ia',{method:'POST',headers:{'content-type':'application/json','Authorization':'Bearer '+s.access_token},body:JSON.stringify({materia:mat.nombre,curso:G,tema:uActual.nombre,conceptos:uActual.items.map(i=>i.t),debiles})});
      if(!r.ok) return null;
      const d=await r.json(); if(!d||!d.q||!Array.isArray(d.ops)||typeof d.correcta!=='number') return null;
      return {key:'ia:'+Math.random().toString(36).slice(2), tipo:'ops', concepto:null, emoji:'🤖', prompt:d.q, sub:'🤖 Pregunta creada especialmente para ti', ops:mezcla(d.ops.map((o,k)=>({text:o,ok:k===d.correcta}))), porque:d.porque||''};
    }catch(e){ return null; }
  }

  init();
