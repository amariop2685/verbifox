<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>VerbiFox · Mis asignaturas</title>
<style>
  :root{ --naranja:#ff7a18; --naranja2:#ff9d4d; --tinta:#26303b; --verde:#2bb673; --linea:#e3e9ef; }
  *{ box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body{ margin:0; background:#f6f8fb; color:var(--tinta); }
  .hero{ background:linear-gradient(135deg,var(--naranja),var(--naranja2)); color:#fff; padding:26px 20px 22px; text-align:center; }
  .hero .fox{ font-size:2.6rem; }
  .hero h1{ margin:4px 0 2px; font-size:1.5rem; }
  .hero p{ margin:0; opacity:.95; }
  .cursos{ display:flex; gap:8px; overflow-x:auto; padding:14px 16px; justify-content:center; flex-wrap:wrap; }
  .curso{ border:2px solid var(--linea); background:#fff; padding:9px 15px; border-radius:999px; font-weight:800; cursor:pointer; white-space:nowrap; color:#5a6b7a; }
  .curso.on{ background:var(--naranja); color:#fff; border-color:var(--naranja); }
  .wrap{ max-width:900px; margin:0 auto; padding:4px 16px 40px; }
  .tit{ text-align:center; color:#5a6b7a; margin:10px 0 14px; font-weight:600; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }
  .mat{ background:#fff; border:1px solid var(--linea); border-radius:18px; padding:18px 14px; text-align:center; text-decoration:none; color:inherit; box-shadow:0 3px 12px rgba(0,0,0,.05); position:relative; display:block; }
  .mat.on:hover{ transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,.1); }
  .mat.off{ opacity:.62; }
  .mat .ic{ font-size:2.6rem; }
  .mat .nm{ font-weight:800; margin-top:8px; font-size:.98rem; line-height:1.2; }
  .badge{ display:inline-block; margin-top:8px; font-size:.72rem; font-weight:800; padding:3px 10px; border-radius:999px; }
  .badge.go{ background:#e3f7ee; color:var(--verde); }
  .badge.soon{ background:#eef2f6; color:#8294a4; }
  .pie{ text-align:center; margin-top:22px; }
  .pie a{ color:var(--naranja); font-weight:700; text-decoration:none; margin:0 8px; }
  .nota{ text-align:center; color:#9fb0bf; font-size:.82rem; margin-top:16px; }
</style>
<link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="hero">
    <div class="fox">🦊</div>
    <h1 id="saludo">¡Hola!</h1>
    <p id="heroSub">Elige tu curso y entra a tus asignaturas 🎒</p>
  </div>

  <!-- ¿QUIÉN APRENDE HOY? (perfiles con avatar) -->
  <div id="perfiles" class="wrap" style="display:none">
    <h2 style="text-align:center;margin:18px 0 6px">¿Quién aprende hoy?</h2>
    <div id="perfilesGrid" style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:10px 0 4px"></div>
  </div>
  <div id="perfilChip" class="wrap" style="display:none;text-align:center;padding-top:8px">
    <span id="chipTxt" style="background:#fff;border:2px solid #ffb454;border-radius:999px;padding:8px 16px;font-weight:800"></span>
    <button onclick="cambiarPerfil()" style="background:none;border:0;color:#ff7a18;font-weight:700;cursor:pointer;text-decoration:underline">Cambiar</button>
  </div>

  <!-- ENTRADA DEL NIÑO CON SU CÓDIGO (sin cuenta, desde cualquier dispositivo) -->
  <div id="codigoBox" class="wrap" style="display:none;max-width:420px">
    <div style="background:#fff;border:2px solid #e3e9ef;border-radius:18px;padding:18px;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.06)">
      <div style="font-size:2.2rem">🔑</div>
      <h3 style="margin:6px 0">Entra con tu código</h3>
      <p style="color:#8294a4;font-size:.9rem;margin:0 0 10px">Pídele tu código a papá o mamá (aparece en su panel).</p>
      <input id="codeInput" placeholder="EJ: MAR1234" maxlength="10" autocapitalize="characters" autocomplete="off"
        style="width:100%;padding:12px;border:2px solid #e3e9ef;border-radius:12px;font-size:1.25rem;text-align:center;text-transform:uppercase;letter-spacing:2px"
        onkeydown="if(event.key==='Enter')entrarCodigo()">
      <button onclick="entrarCodigo()" style="width:100%;margin-top:10px;background:#ff7a18;color:#fff;border:0;border-radius:12px;padding:13px;font-weight:800;font-size:1rem;cursor:pointer">▶ ¡Entrar!</button>
      <div id="codeErr" style="display:none;background:#fdeceb;color:#e15554;border-radius:10px;padding:8px;margin-top:8px;font-size:.9rem"></div>
    </div>
  </div>

  <div class="cursos" id="cursos"></div>
  <div class="wrap">
    <div class="tit" id="subtit"></div>
    <div class="grid" id="grid"></div>
    <div class="nota" id="nota"></div>
    <div class="pie">
      <a href="panel.html">👨‍👩‍👦 Panel del apoderado</a> ·
      <a href="soporte.html">💬 Ayuda</a>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="cloud.js"></script>
<script src="contenido.js"></script>
<script>
  const $ = id => document.getElementById(id);

  // Asignaturas del plan de estudios de 1º a 6º básico
  const ASIGNATURAS = [
    { id:'lenguaje',   nm:'Lenguaje y Comunicación', ic:'📖' },
    { id:'matematicas', nm:'Matemática',             ic:'➗', app:'mate.html', grados:['5°'] },
    { id:'historia',   nm:'Historia y Geografía',    ic:'🌎' },
    { id:'ciencias',   nm:'Ciencias Naturales',      ic:'🔬' },
    { id:'ingles',     nm:'Inglés',                  ic:'🔤', app:'ingles.html', grados:['1°','2°','3°','4°','5°','6°'] },
    { id:'artes',      nm:'Artes Visuales',          ic:'🎨' },
    { id:'musica',     nm:'Música',                  ic:'🎵' },
    { id:'edfisica',   nm:'Educación Física',        ic:'⛹️' },
    { id:'tecnologia', nm:'Tecnología',              ic:'💻' },
    { id:'orientacion',nm:'Orientación',             ic:'🧭' },
  ];
  const CURSOS = ['1°','2°','3°','4°','5°','6°'];
  // Por ahora el contenido está listo para 5° básico
  const CURSO_CON_CONTENIDO = '5°';

  let curso = localStorage.getItem('vfx_curso') || '5°';
  if(!CURSOS.includes(curso)) curso='5°';

  function nombre(){
    return localStorage.getItem('jugador') || localStorage.getItem('vfx_student_nombre') || '';
  }

  function pintarCursos(){
    $('cursos').innerHTML = CURSOS.map(c =>
      `<button class="curso ${c===curso?'on':''}" onclick="setCurso('${c}')">${c} Básico</button>`).join('');
  }
  function setCurso(c){ curso=c; try{localStorage.setItem('vfx_curso',c);}catch(e){} render(); }

  function linkDe(a){
    const gn=(curso.match(/[1-6]/)||[])[0];
    if(a.app && a.grados && a.grados.includes(curso)) return a.app;
    if(gn && window.CONTENIDO && CONTENIDO[a.id] && CONTENIDO[a.id].cursos && CONTENIDO[a.id].cursos[gn])
      return 'materia.html?m='+a.id+'&g='+gn;
    return null;
  }
  function render(){
    pintarCursos();
    const n = nombre();
    $('saludo').textContent = n ? ('¡Hola, '+n+'!') : '¡Hola!';
    $('subtit').textContent = 'Asignaturas de '+curso+' Básico';
    $('grid').innerHTML = ASIGNATURAS.map((a,i)=>{
      const link = linkDe(a);
      const delay = `animation-delay:${i*45}ms`;
      if(link){
        return `<a class="mat on vfx-up" style="${delay}" href="${link}">
          <div class="ic">${a.ic}</div><div class="nm">${a.nm}</div>
          <span class="badge go">¡Disponible! ▶</span></a>`;
      }
      return `<div class="mat off vfx-up" style="cursor:pointer;${delay}" onclick="proximamente('${a.nm}')">
        <div class="ic">${a.ic}</div><div class="nm">${a.nm}</div>
        <span class="badge soon">Pronto</span></div>`;
    }).join('');
    const dispoNames = ASIGNATURAS.filter(a=>linkDe(a)).map(a=>a.nm);
    $('nota').innerHTML = dispoNames.length
      ? `En ${curso} Básico ya tienes: <b>${dispoNames.join('</b>, <b>')}</b>. Las demás asignaturas se irán agregando. 🚀`
      : `El contenido de ${curso} Básico se está preparando. 🌱`;
  }
  function proximamente(nm){ alert('📚 '+nm+'\n\n¡Estamos preparando esta asignatura! Muy pronto disponible.'); }

  render();

  // ===== Perfiles: el niño se reconoce por su avatar y nombre =====
  let misHijos=[];
  async function elegirPerfil(id){
    const h=misHijos.find(x=>x.id===id); if(!h) return;
    // baja su avance de la nube ANTES de fijarlo (así ve lo mismo en cualquier dispositivo)
    try{ const s=await VFX.sesion(); if(s && VFX.cargarEstadoNube) await VFX.cargarEstadoNube(h.id); }catch(e){}
    try{
      VFX.setStudentActivo(h.id, h.nombre);
      localStorage.setItem('jugador', h.nombre);
      const m=(String(h.curso||'').match(/[1-6]/)||[])[0];
      if(m){ curso=m+'°'; localStorage.setItem('vfx_curso',curso); }
    }catch(e){}
    pintarPerfiles(); render();
  }
  function cambiarPerfil(){
    try{ if(window.VFX && VFX.subirEstadoNube) VFX.subirEstadoNube(); }catch(e){} // guarda antes de cambiar
    try{ ['vfx_student','vfx_student_nombre','vfx_code','vfx_code_info'].forEach(k=>localStorage.removeItem(k)); }catch(e){}
    setTimeout(()=>location.reload(), 300);
  }
  // --- Entrada por código (el niño solo, sin cuenta) ---
  function mostrarEntradaCodigo(){
    $('codigoBox').style.display='block';
    $('heroSub').textContent='Escribe tu código para entrar 🔑';
  }
  async function entrarCodigo(){
    const c=($('codeInput').value||'').trim(), err=$('codeErr');
    if(c.length<5){ err.textContent='Escribe tu código completo (letras y números).'; err.style.display='block'; return; }
    try{
      const d=await VFX.entrarConCodigo(c);
      if(!d){ err.textContent='No encontramos ese código. Revísalo con papá o mamá 🙈'; err.style.display='block'; return; }
      location.reload();
    }catch(e){ err.textContent='No se pudo entrar. Intenta de nuevo en un momento.'; err.style.display='block'; }
  }
  // ▶ Continuar donde quedé: la app lleva al niño directo a su siguiente actividad
  function pintarContinuar(){
    let r=null; try{ r=JSON.parse(localStorage.getItem('vfx_ruta')||'null'); }catch(e){}
    const viejo=document.getElementById('btnContinuar'); if(viejo) viejo.remove();
    if(!r || !r.m || !r.uid) return;
    const gn=(curso.match(/[1-6]/)||[])[0];
    if(r.g && gn && r.g!==gn) return; // la ruta guardada es de otro curso (otro hermano)
    const PASOS={leccion:'la lección 📖',practica:'practicar 🎮',prueba:'la prueba 📝'};
    const a=document.createElement('a');
    a.id='btnContinuar';
    a.href='materia.html?m='+r.m+'&g='+r.g+'&u='+encodeURIComponent(r.uid)+'&paso='+(r.paso||'');
    a.style.cssText='display:block;max-width:520px;margin:14px auto 0;text-align:center;background:linear-gradient(135deg,#2bb673,#57cf95);color:#fff;text-decoration:none;font-weight:800;padding:16px;border-radius:16px;box-shadow:0 8px 20px rgba(43,182,115,.35);font-size:1.05rem';
    a.innerHTML='▶ CONTINUAR donde quedé<br><span style="font-size:.85rem;font-weight:600">'+(r.emoji||'📚')+' '+(r.materia||'')+' · '+(r.unidad||'')+' · te toca '+(PASOS[r.paso]||'seguir')+'</span>';
    const cursosEl=document.getElementById('cursos');
    cursosEl.parentNode.insertBefore(a, cursosEl);
  }
  function pintarPerfiles(){
    if(!misHijos.length){ $('perfiles').style.display='none'; $('perfilChip').style.display='none'; return; }
    const sel = (VFX.studentActivo && VFX.studentActivo()) || null;
    const activo = misHijos.find(h=>h.id===sel);
    if(activo){
      $('perfiles').style.display='none';
      $('perfilChip').style.display='block';
      $('chipTxt').textContent = (activo.avatar||'🦊')+' '+activo.nombre;
      $('saludo').textContent='¡Hola, '+activo.nombre+'!';
      $('heroSub').textContent='¡A aprender se ha dicho! 🎒';
      pintarContinuar();
    } else {
      $('perfilChip').style.display='none';
      $('perfiles').style.display='block';
      $('saludo').textContent='¡Hola!';
      $('heroSub').textContent='Toca tu cara para entrar 👇';
      $('perfilesGrid').innerHTML = misHijos.map(h=>`
        <div onclick="elegirPerfil('${h.id}')" style="cursor:pointer;text-align:center;background:#fff;border:2px solid var(--linea);border-radius:18px;padding:16px 20px;min-width:110px;box-shadow:0 4px 14px rgba(0,0,0,.06)">
          <div style="font-size:3rem">${h.avatar||'🦊'}</div>
          <div style="font-weight:800;margin-top:4px">${h.nombre}</div>
          <div style="font-size:.8rem;color:#8294a4">${h.curso||''}</div>
        </div>`).join('');
    }
  }

  document.addEventListener('vfx-listo', async ()=>{
    try{
      const s = await VFX.sesion();
      if(s){
        misHijos = await VFX.misHijos();
        const sid = VFX.studentActivo && VFX.studentActivo();
        const h = misHijos.find(x=>x.id===sid);
        if(h){
          if(h.nombre){ try{localStorage.setItem('vfx_student_nombre',h.nombre);}catch(e){} }
          const m=(String(h.curso||'').match(/[1-6]/)||[])[0];
          if(m){ curso=m+'°'; try{localStorage.setItem('vfx_curso',curso);}catch(e){} }
        } else if(misHijos.length===1){
          elegirPerfil(misHijos[0].id); return;
        }
        pintarPerfiles(); render();
        return;
      }
      // SIN sesión: ¿el niño ya entró con su código en este dispositivo?
      let info=null; try{ info=JSON.parse(localStorage.getItem('vfx_code_info')||'null'); }catch(e){}
      if(info && VFX.codigoActivo && VFX.codigoActivo()){
        misHijos=[info];
        if((VFX.studentActivo&&VFX.studentActivo())!==info.id) VFX.setStudentActivo(info.id, info.nombre);
        const m=(String(info.curso||'').match(/[1-6]/)||[])[0];
        if(m){ curso=m+'°'; try{localStorage.setItem('vfx_curso',curso);}catch(e){} }
        pintarPerfiles(); render();
        return;
      }
      // Sin sesión ni código → invitar a entrar con código
      mostrarEntradaCodigo();
    }catch(e){}
  });
</script>
</body>
</html>
